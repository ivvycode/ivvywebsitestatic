<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | iVvy</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to the iVvy homepage.">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .error-page {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px;
    }
    .error-page__code {
      font-size: 120px;
      font-weight: 800;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 16px;
    }
    .error-page__title {
      font-size: 28px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 12px;
    }
    .error-page__text {
      font-size: 18px;
      color: #64748b;
      margin-bottom: 32px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }
    .error-page__btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .error-page__btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(99,102,241,0.3);
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <section class="error-page">
    <div>
      <div class="error-page__code">404</div>
      <h1 class="error-page__title">Page not found</h1>
      <p class="error-page__text">Sorry, the page you're looking for doesn't exist or has been moved.</p>
      <a href="index.html" class="error-page__btn">Back to Homepage</a>
    </div>
  </section>

  <div id="footer-placeholder"></div>
  <script src="js/scripts.js"></script>
</body>
</html>
