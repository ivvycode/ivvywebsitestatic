<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Toby Test</title>
  <meta name="robots" content="noindex, nofollow">
  <meta property="og:title" content="Toby Test">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Nunito+Sans:wght@600;700&family=Nunito:wght@400;600;700&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; }
    img { max-width: 100%; height: auto; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .lp-hero { position: relative; }
    .lp-hero h1 { font-family: var(--font-heading, 'Poppins', sans-serif); font-size: clamp(2rem, 5vw, 3.75rem); font-weight: 800; line-height: 1.1; margin: 0 0 16px; }
    .lp-hero p { font-size: 1.125rem; line-height: 1.6; margin: 0 0 24px; }
    .lp-richtext { max-width: 960px; margin: 0 auto; }
    .lp-richtext h2 { font-family: var(--font-heading, 'Poppins', sans-serif); font-weight: 800; font-size: clamp(1.5rem, 3vw, 2.25rem); margin: 0 0 12px; }
    .lp-richtext p { font-family: var(--font-body, 'Nunito Sans', sans-serif); line-height: 1.7; margin: 0 0 16px; }
    .lp-richtext img, .lp-richtext iframe, .lp-richtext video { max-width: 100%; }
    .lp-two-col, .lp-three-col { max-width: 1200px; margin: 0 auto; }
    .lp-stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .lp-stat__value { font-family: var(--font-heading, 'Poppins', sans-serif); font-size: 2rem; font-weight: 800; color: var(--color-primary, #99CC52); }
    .lp-stat__label { font-family: var(--font-body, 'Nunito Sans', sans-serif); font-size: 0.875rem; color: #666; }
    .lp-testimonial blockquote { font-family: var(--font-heading, 'Poppins', sans-serif); font-style: normal; border: none; padding: 0; margin: 0; }
    .lp-banner h2 { font-family: var(--font-heading, 'Poppins', sans-serif); font-weight: 800; font-size: clamp(1.5rem, 3vw, 2.25rem); margin: 0 0 12px; }
    .lp-hubspot { max-width: 640px; margin: 0 auto; }
    .lp-spacer { pointer-events: none; }
    .lp-divider { display: block; }
    .btn { display: inline-block; padding: 14px 32px; border-radius: 12px; font-family: var(--font-heading, 'Poppins', sans-serif); font-weight: 700; font-size: 1rem; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
    .btn:hover { transform: translateY(-2px); }
    .btn--primary { background: var(--color-primary, #99CC52); color: #fff; box-shadow: 0 4px 14px rgba(153,204,82,0.3); }
    .btn--primary:hover { box-shadow: 0 6px 20px rgba(153,204,82,0.4); }
    .btn--secondary { background: #fff; color: var(--dark-green, #103620); border: 2px solid var(--border, #e5e7eb); }
    .btn--outline { background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.3); }
    @media (max-width: 768px) {
      .lp-two-col .container { grid-template-columns: 1fr !important; }
      .lp-three-col .container { grid-template-columns: 1fr !important; }
      .lp-stats .container { grid-template-columns: repeat(2, 1fr) !important; }
      .lp-image-grid .container { grid-template-columns: 1fr !important; }
      .lp-feature-cards [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
      .lp-proof-bar [style*="grid-template-columns"] { grid-template-columns: repeat(2, 1fr) !important; }
      .lp-benefits-split [style*="grid-template-columns"] { grid-template-columns: 1fr !important; gap: 32px !important; }
      .lp-trust [style*="grid-template-columns"] { grid-template-columns: 1fr !important; gap: 32px !important; }
      .lp-cta-dark [style*="grid-template-columns"] { grid-template-columns: repeat(2, 1fr) !important; }
      .lp-comparison .container { -webkit-overflow-scrolling: touch; }
      .lp-table .container { -webkit-overflow-scrolling: touch; }
      .lp-hero-split { flex-direction: column !important; }
      .lp-hero-split > div { flex: unset !important; width: 100% !important; }
      .lp-spacer { height: clamp(16px, 4vw, 40px) !important; }
      h2 { font-size: clamp(1.5rem, 5vw, 2.75rem) !important; }
    }
    @media (max-width: 480px) {
      .lp-stats .container { grid-template-columns: 1fr !important; }
      .lp-proof-bar [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
      .lp-cta-dark [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
      .container { padding: 0 16px; }
    }
  </style>
  <style>
/* Landing page theme */
.lp-page { font-family: Nunito, sans-serif; font-size: 1rem; line-height: 1.65; color: #666666; background: #ffffff; }
.lp-page .container { max-width: 1200px; margin: 0 auto; }
.lp-page h1 { font-family: Poppins, sans-serif; font-size: 3.75rem; font-weight: 700; color: #103620; line-height: 1.15; margin-bottom: 0.5em; }
.lp-page h2 { font-family: Poppins, sans-serif; font-size: 2.75rem; font-weight: 800; color: #103620; line-height: 1.2; margin-bottom: 0.5em; }
.lp-page h3 { font-family: Poppins, sans-serif; font-size: 1.5rem; font-weight: 800; color: #103620; line-height: 1.3; margin-bottom: 0.4em; }
.lp-page h4 { font-family: Poppins, sans-serif; font-size: 1.125rem; font-weight: 700; color: #103620; line-height: 1.4; margin-bottom: 0.4em; }
.lp-page a { color: #99CC52; }
.lp-page img { border-radius: 16px; }
.lp-page section { padding: 64px 24px; }
.btn.btn--primary { display: inline-block; background: #99CC52; color: #ffffff; border-radius: 9999px; padding: 12px 28px; font-weight: 600; font-size: 0.9375rem; font-family: Nunito, sans-serif; text-decoration: none; border: none; cursor: pointer; transition: opacity 0.2s; }
.btn.btn--primary:hover { opacity: 0.9; }
.btn.btn--secondary { display: inline-block; background: #ffffff; color: #103620; border: 2px solid #103620; border-radius: 9999px; padding: 12px 28px; font-weight: 600; font-size: 0.9375rem; font-family: Nunito, sans-serif; text-decoration: none; cursor: pointer; transition: opacity 0.2s; }
.btn.btn--secondary:hover { opacity: 0.85; }
.btn.btn--ghost { display: inline-block; background: transparent; color: #103620; border: none; padding: 12px 28px; font-weight: 600; font-size: 0.9375rem; font-family: Nunito, sans-serif; text-decoration: underline; cursor: pointer; }
  </style>
</head>
<body>






</body>
</html>
